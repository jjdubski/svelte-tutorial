<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#e8effb" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Outfit:wght@300;400;500;600&family=Calligraffitti&display=swap"
			rel="stylesheet"
		/>
		<!-- Dark mode preload: reads localStorage / prefers-color-scheme BEFORE first paint to eliminate FOUC -->
		<script>
			try {
				var d = localStorage.getItem('darkMode');
				if (d !== null) {
					if (JSON.parse(d)) document.documentElement.classList.add('dark');
				} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
